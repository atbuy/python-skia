[recording]
clip_seconds = 30
segment_seconds = 2
# backend choices:
#   auto                       — pick by platform/runtime
#   linux-wayland-ffmpeg       — Wayland via FFmpeg `-f pipewire` (needs FFmpeg with pipewire device)
#   linux-wayland-gstreamer    — Wayland via gst-launch-1.0 pipewiresrc + splitmuxsink (recommended on Arch)
#   linux-x11-ffmpeg           — X11 via FFmpeg x11grab
#   windows-ffmpeg             — Windows via FFmpeg gdigrab
#   macos-ffmpeg               — macOS via FFmpeg avfoundation
backend = "auto"
fps = 60
cache_dir = ".cache/skia"

# Optional overrides.
# Wayland normally gets video_input from XDG Desktop Portal (the screen-share picker).
# X11 can use ":0.0"; Windows can use "desktop"; macOS can use "1".
# For linux-wayland-gstreamer, video_input may also be a PipeWire node id as a string.
# video_input = ":0.0"
# audio_input = "default"

[app]
hotkey = "<ctrl>+."
output_dir = "out"

# Optional gstreamer quality knobs. Leaving these unset keeps the built-in
# defaults (CRF-style quantizer=20 + medium preset for x264, 20 Mbps VBR for
# NVENC/VAAPI, 160 kbps Opus audio).
# [gstreamer]
# bitrate_kbps = 20000        # NVENC / VAAPI target bitrate (kbps)
# quantizer = 20              # x264 CRF-style quantizer (0-51, lower = better)
# x264_preset = "medium"      # x264 speed-preset (e.g. veryfast, fast, medium, slow)
# audio_bitrate_bps = 160000  # Opus audio bitrate (bits per second)
